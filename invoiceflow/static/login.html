<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice Sorter — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* Animated dot background like landing page */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle, #c7cdee 1.5px, transparent 1.5px);
      background-size: 48px 48px;
      opacity: 0.45;
      pointer-events: none;
      z-index: 0;
    }
    nav {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 48px;
    }
    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #3b5bdb;
      text-decoration: none;
    }
    .main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 40px rgba(59,91,219,0.10);
      border: 1px solid rgba(59,91,219,0.08);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #eef2ff;
      color: #3b5bdb;
      border: 1px solid #c5d0fa;
      padding: 5px 14px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 28px;
    }
    .dot { width: 7px; height: 7px; background: #40c057; border-radius: 50%; }
    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #1a1f36;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 14px;
      color: #8792a2;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 15px;
      color: #1a1f36;
      background: #f9fafb;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 20px;
    }
    input:focus {
      border-color: #3b5bdb;
      box-shadow: 0 0 0 3px rgba(59,91,219,0.12);
      background: #fff;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: #3b5bdb;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 4px;
    }
    .btn:hover { background: #2f4ac0; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .error {
      background: #fff0f0;
      color: #c92a2a;
      border: 1px solid #ffc9c9;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <nav>
    <a href="https://www.invoice-sorter.com" class="logo">InvoiceFlow</a>
  </nav>

  <div class="main">
    <div class="card">
      <div class="badge"><span class="dot"></span> AI-powered · Live</div>
      <h1>Sign in</h1>
      <p class="subtitle">Enter your credentials to continue</p>

      <label>Username</label>
      <input type="text" id="username" placeholder="dornack" autocomplete="username">

      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">

      <button class="btn" onclick="doLogin()">Login</button>
      <div class="error" id="error">Invalid username or password.</div>
    </div>
  </div>

  <footer>Invoice Sorter — customs document processing</footer>

  <script>
    async function doLogin() {
      const username = document.getElementById('username').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const btn = document.querySelector('.btn');
      const err = document.getElementById('error');
      err.style.display = 'none';
      btn.textContent = 'Signing in...';
      btn.disabled = true;
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        if (r.ok) {
          window.location.href = '/';
        } else {
          err.style.display = 'block';
          btn.textContent = 'Login';
          btn.disabled = false;
        }
      } catch(e) {
        err.style.display = 'block';
        btn.textContent = 'Login';
        btn.disabled = false;
      }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
