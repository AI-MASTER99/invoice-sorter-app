<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice Sorter — Sign in</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="googlebot" content="noindex, nofollow" />
  <link rel="canonical" href="https://www.invoice-sorter.com/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #ffffff;
      color: #0f172a;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }

    /* Background particle canvas */
    #network-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .login-wrap {
      width: 380px;
      padding: 40px 36px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 48px rgba(99,102,241,0.13), 0 2px 12px rgba(0,0,0,0.05);
      position: relative;
      z-index: 1;
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f0fdf4;
      color: #166534;
      padding: 4px 11px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
      margin-bottom: 18px;
      border: 1px solid #bbf7d0;
    }
    .badge-dot {
      width: 7px; height: 7px;
      background: #22c55e;
      border-radius: 50%;
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .logo-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 6px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      color: white;
      box-shadow: 0 6px 20px rgba(67,97,238,0.35);
    }
    .logo-icon svg { width: 26px; height: 26px; }
    .logo-text {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 16px 0 6px;
      color: #0f172a;
    }
    .subtitle {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 7px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      font-family: inherit;
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      color: #0f172a;
      outline: none;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }
    .field input::placeholder { color: #94a3b8; }
    .field input:focus {
      border-color: #6366f1;
      background: white;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    }

    .btn-login {
      width: 100%;
      margin-top: 10px;
      padding: 13px;
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      color: #fff;
      border: none;
      border-radius: 11px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.01em;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(67,97,238,0.35);
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-login:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; cursor: default; transform: none; }

    .error-msg {
      margin-top: 14px;
      padding: 11px 14px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: #dc2626;
      font-size: 13px;
      display: none;
    }
    .error-msg.show { display: block; }

    .divider {
      margin: 22px 0 16px;
      border-top: 1px solid #e2e8f0;
    }
    .no-account {
      text-align: center;
      color: #64748b;
      font-size: 13px;
    }
    .contact-link {
      color: #2563eb;
      text-decoration: none;
      font-weight: 700;
      margin-left: 4px;
      transition: color 0.15s;
    }
    .contact-link:hover { color: #7c3aed; }

    .footer {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      color: #94a3b8;
      font-size: 12px;
      z-index: 1;
    }
  </style>
</head>
<body>
  <canvas id="network-bg"></canvas>

  <div class="login-wrap">
    <div class="badge">
      <span class="badge-dot"></span>
      AI-powered · Live
    </div>

    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <!-- Document body with folded corner -->
          <path d="M11 7 H22 L29 14 V32 a1 1 0 0 1 -1 1 H12 a1 1 0 0 1 -1 -1 Z"
                fill="rgba(255,255,255,0.18)"
                stroke="white" stroke-width="2" stroke-linejoin="round"/>
          <path d="M22 7 V13 a1 1 0 0 0 1 1 H29"
                fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/>
          <!-- Sorted lines (varying widths) -->
          <line x1="15" y1="19"   x2="25" y2="19"   stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="15" y1="23.5" x2="22" y2="23.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="15" y1="28"   x2="24" y2="28"   stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="logo-text">Invoice Sorter</div>
    </div>

    <div class="title">Sign in</div>
    <div class="subtitle">Enter your company and credentials to continue</div>

    <form id="login-form">
      <div class="field">
        <label>Company</label>
        <input type="text" id="login-company" autocomplete="organization" placeholder="Your company" />
      </div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="login-username" autocomplete="username" placeholder="admin" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" autocomplete="current-password" placeholder="••••••••" />
      </div>
      <button type="submit" class="btn-login" id="btn-login">Sign in →</button>
      <div class="error-msg" id="login-error">Invalid credentials.</div>
    </form>

    <div class="divider"></div>
    <div class="no-account">
      Don't have an account yet?
      <a href="https://www.invoice-sorter.com/#contact" class="contact-link">Contact us →</a>
    </div>
  </div>

  <div class="footer">Invoice Sorter — customs document processing</div>

  <script>
    // ─── Particle network background ───────────────────────
    const canvas = document.getElementById('network-bg');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];
    const mouse = { x: -999, y: -999 };
    const PARTICLE_COUNT = 70;
    const LINK_DISTANCE = 120;

    function resize() {
      W = canvas.width  = window.innerWidth  * devicePixelRatio;
      H = canvas.height = window.innerHeight * devicePixelRatio;
      canvas.style.width  = window.innerWidth  + 'px';
      canvas.style.height = window.innerHeight + 'px';
    }
    resize();
    window.addEventListener('resize', resize);

    function init() {
      particles = [];
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 0.5 * devicePixelRatio,
          vy: (Math.random() - 0.5) * 0.5 * devicePixelRatio,
        });
      }
    }
    init();

    window.addEventListener('mousemove', e => {
      mouse.x = e.clientX * devicePixelRatio;
      mouse.y = e.clientY * devicePixelRatio;
    });

    function frame() {
      ctx.clearRect(0, 0, W, H);
      const dist = LINK_DISTANCE * devicePixelRatio;

      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0 || p.x > W) p.vx *= -1;
        if (p.y < 0 || p.y > H) p.vy *= -1;

        // Mouse repulsion
        const dx = p.x - mouse.x, dy = p.y - mouse.y;
        const d = Math.hypot(dx, dy);
        if (d < dist) {
          p.x += dx / d * 0.5;
          p.y += dy / d * 0.5;
        }

        // Particle dot
        ctx.beginPath();
        ctx.fillStyle = 'rgba(99,102,241,0.4)';
        ctx.arc(p.x, p.y, 2 * devicePixelRatio, 0, Math.PI * 2);
        ctx.fill();
      }

      // Connecting lines with gradient
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const a = particles[i], b = particles[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d = Math.hypot(dx, dy);
          if (d < dist) {
            const alpha = (1 - d / dist) * 0.18;
            const grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
            grad.addColorStop(0, `rgba(37,99,235,${alpha})`);
            grad.addColorStop(1, `rgba(124,58,237,${alpha})`);
            ctx.strokeStyle = grad;
            ctx.lineWidth = 1 * devicePixelRatio;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(frame);
    }
    frame();

    // ─── Login form ────────────────────────────────────────
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const err = document.getElementById('login-error');
      const company  = document.getElementById('login-company').value.trim();
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      err.classList.remove('show');
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ company, username, password }),
          credentials: 'include',
        });
        if (r.ok) {
          window.location.href = '/';
        } else {
          const data = await r.json().catch(() => ({}));
          err.textContent = data.detail || 'Invalid credentials.';
          err.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Sign in →';
        }
      } catch {
        err.textContent = 'Connection error. Is the server running?';
        err.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign in →';
      }
    });
  </script>
</body>
</html>
