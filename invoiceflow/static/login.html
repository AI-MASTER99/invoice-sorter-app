<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice Sorter — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:   #090f1e;
      --navy2:  #0e1628;
      --navy3:  #141e35;
      --navy4:  #1a2540;
      --accent: #4f8ef7;
      --green:  #22c98a;
      --red:    #e74c4c;
      --text:   #e8eaf0;
      --muted:  #8892a4;
      --border: rgba(255,255,255,0.07);
    }
    html, body {
      height: 100%;
      background: var(--navy);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      justify-content: center;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #4f8ef7, #7c5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .beta-pill {
      background: rgba(79,142,247,0.15);
      color: var(--accent);
      border: 1px solid rgba(79,142,247,0.3);
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .login-card {
      background: var(--navy2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
    }
    .login-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .login-sub {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 28px;
    }
    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      background: var(--navy3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus {
      border-color: var(--accent);
    }
    .btn-login {
      width: 100%;
      margin-top: 8px;
      padding: 11px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-login:hover { opacity: 0.88; }
    .btn-login:disabled { opacity: 0.5; cursor: default; }
    .error-msg {
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(231,76,76,0.12);
      border: 1px solid rgba(231,76,76,0.3);
      border-radius: 8px;
      color: var(--red);
      font-size: 13px;
      display: none;
    }
    .error-msg.show { display: block; }
    .login-footer {
      margin-top: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">Invoice Sorter</div>
      <span class="beta-pill">beta</span>
    </div>
    <div class="login-card">
      <div class="login-title">Sign in</div>
      <div class="login-sub">Enter your credentials to continue</div>
      <form id="login-form">
        <div class="field">
          <label>Username</label>
          <input type="text" id="username" autocomplete="username" autofocus placeholder="admin" />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn-login" id="btn-login">Sign in</button>
        <div class="error-msg" id="error-msg">Invalid username or password.</div>
      </form>
    </div>
    <div class="login-footer">Invoice Sorter — customs document processing</div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const err = document.getElementById('error-msg');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      err.classList.remove('show');
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          credentials: 'include',
        });
        if (r.ok) {
          window.location.href = '/';
        } else {
          err.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Sign in';
        }
      } catch {
        err.textContent = 'Connection error. Is the server running?';
        err.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
