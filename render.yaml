services:
  - type: web
    name: invoice-sorter
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r invoiceflow/requirements.txt
    # --proxy-headers + --forwarded-allow-ips='*' so request.client.host
    # reflects the real client IP behind Render's edge proxy. The login
    # rate limiter relies on this; without it every request appears to
    # come from the proxy and the per-IP cap is global.
    startCommand: cd invoiceflow && uvicorn main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips='*'
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.5"
      # Real secrets are configured in the Render dashboard, NOT in this file
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      # Phase B: per-request user-scoped Supabase client.
      # SUPABASE_ANON_KEY is the public anon JWT — combined with the user
      # JWT (signed below), PostgREST switches to the `authenticated` role
      # and RLS policies become effective.
      - key: SUPABASE_ANON_KEY
        sync: false
      # Phase B: HS256 secret for minting per-request user JWTs.
      # Must match the JWT secret configured in the Supabase project
      # (Settings → API → JWT Settings → JWT secret). Rotating it
      # invalidates every in-flight JWT — but since they're 30-min and
      # never leave the server, that's only a brief window.
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: AI_MODEL_PRIMARY
        value: claude-opus-4-7
      - key: AI_MODEL_LIGHT
        value: claude-sonnet-4-6
    autoDeploy: true
