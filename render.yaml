services:
  - type: web
    name: invoice-sorter
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r invoiceflow/requirements.txt
    # --proxy-headers + --forwarded-allow-ips='*' so request.client.host
    # reflects the real client IP behind Render's edge proxy. The login
    # rate limiter relies on this; without it every request appears to
    # come from the proxy and the per-IP cap is global.
    startCommand: cd invoiceflow && uvicorn main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips='*'
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.5"
      # Real secrets are configured in the Render dashboard, NOT in this file
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      # Phase B: per-request user-scoped Supabase client.
      # SUPABASE_ANON_KEY is the public anon JWT — combined with the user
      # JWT (signed below), PostgREST switches to the `authenticated` role
      # and RLS policies become effective.
      - key: SUPABASE_ANON_KEY
        sync: false
      # Phase B: HS256 secret for minting per-request user JWTs.
      # Must match the JWT secret configured in the Supabase project
      # (Settings → API → JWT Settings → JWT secret). Rotating it
      # invalidates every in-flight JWT — but since they're 30-min and
      # never leave the server, that's only a brief window.
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: AI_MODEL_PRIMARY
        value: claude-opus-4-8
      - key: AI_MODEL_LIGHT
        value: claude-sonnet-4-6
      # Turn ON the per-client commodity-code list (the "V-lookup"): export
      # columns come from the matched client's product list (list description,
      # full 10-digit code + TARIC, CDS docs); products not in the list are
      # flagged NOT-IN-LIST. Without it the app silently falls back to raw
      # invoice data (8-digit codes, no TARIC).
      - key: USE_CLIENT_LIST
        value: "1"
      # Storage retention: a daily purge deletes upload/export files older
      # than this many days so the buckets never blow the free-tier quota
      # again (they filled to 20 GB → project restricted → app down). The
      # per-client V-lookup lists live in Postgres and are never touched.
      # 0 disables the purge.
      - key: STORAGE_RETENTION_DAYS
        value: "7"
      # ⚠ BREAK-GLASS — TEMPORARY, REMOVE AFTER LOGGING IN. Resets the
      # default admin's password to the current APP_PASSWORD on every
      # boot (the operator is locked out). While present, every deploy
      # re-resets the password. Delete this entry once login works.
      - key: FORCE_ADMIN_RESET
        value: "1"
    autoDeploy: true
